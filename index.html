<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apa nak makan tonight?</title>
  <style>
    body {
      background: linear-gradient(135deg, #ff9900, #ff5e00);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
    }
    h1 {
      font-size: 3rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      margin-bottom: 2rem;
      padding: 0 1rem;
    }
    button {
      background-color: #ffd700;
      color: #b33c00;
      border: none;
      border-radius: 50px;
      padding: 1.5rem 3rem;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:active {
      transform: scale(0.95);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    #result {
      margin-top: 3rem;
      font-size: 4rem;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      min-height: 120px;
      padding: 0 1rem;
    }
    .dish-name { display: block; font-size: 2.5rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Apa nak makan tonight?</h1>
  <button onclick="pickDish()">Pilih untuk saya!</button>
  <div id="result"></div>
  <script>
    const dishes = [
      { name: "Nasi Lemak", emoji: "🍚" }, { name: "Roti Canai", emoji: "🥞" },
      { name: "Laksa", emoji: "🍜" }, { name: "Satay", emoji: "🍢" },
      { name: "Mee Goreng", emoji: "🍝" }, { name: "Cendol", emoji: "🍧" },
      { name: "Rendang", emoji: "🍲" }, { name: "Teh Tarik", emoji: "☕" },
      { name: "Mee Rebus", emoji: "🍜" }, { name: "Nasi Kerabu", emoji: "🥗" }
    ];
    function pickDish() {
      const r = document.getElementById("result");
      r.style.transform = "scale(0.8)";
      setTimeout(() => {
        const d = dishes[Math.floor(Math.random() * dishes.length)];
        r.innerHTML = `${d.emoji}<span class="dish-name">${d.name}</span>`;
        r.style.transition = "transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        r.style.transform = "scale(1)";
      }, 50);
    }
  </script>
</body>
</html>
